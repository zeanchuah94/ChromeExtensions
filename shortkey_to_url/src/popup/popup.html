<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ショートカットナビ</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <span class="popup-icon">⚡</span>
      <span class="popup-title">ショートカットナビ</span>
    </header>

    <!-- ショートカット一覧 -->
    <div id="shortcuts-container">
      <!-- JS で描画 -->
    </div>

    <!-- 全未設定の場合 -->
    <p id="all-empty-msg" class="all-empty-msg" hidden>
      ショートカットにURLが設定されていません
    </p>

    <div class="footer">
      <button id="btn-options" class="btn btn--options">⚙️ URLを管理する</button>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
